<!DOCTYPE html>
<html>
<head>
    <title>Custom Journey Activity</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css">
    <script src="js/postmonger.js"></script>
    <script src="js/customActivity.js"></script>
</head>
<body>
    <div class="container">
        <h1>API Configuration</h1>
        <form id="config-form">
            <div class="form-group">
                <label for="endpoint">API Endpoint</label>
                <input type="url" id="endpoint" required>
            </div>
            
            <div class="form-group">
                <label for="headers">Headers (JSON)</label>
                <textarea id="headers" rows="4"></textarea>
            </div>
            
            <div class="form-group">
                <label for="body">Body Template (JSON)</label>
                <textarea id="body" rows="6"></textarea>
            </div>
            
            <div class="form-group">
                <button type="button" id="save">Save</button>
            </div>
        </form>
    </div>
</body>
</html>
